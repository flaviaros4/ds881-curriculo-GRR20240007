name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  lint:
    name: Lint HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar HTMLHint
        run: npm install -g htmlhint

      - name: Lint index.html
        run: htmlhint index.html

  build:
    name: Build e Empacotar
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar Dockerfile (build da imagem)
        run: docker build -t curriculo-preview .

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Empacotar arquivos para o GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    name: Deploy no GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
